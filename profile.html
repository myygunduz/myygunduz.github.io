<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Profil — StudyDeck</title>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
.prof-pg { padding-bottom: calc(var(--nb-h) + var(--sb) + 12px); }

/* hero */
.p-hero {
  text-align: center; padding: 24px 16px 20px;
  background: linear-gradient(135deg,#f8f4ff,#f2fbf9);
  border: 1.5px solid var(--border); border-radius: 18px; margin-bottom: 12px;
}
.p-av {
  width: 76px; height: 76px; border-radius: 50%;
  background: linear-gradient(135deg,var(--lav),var(--mint));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; margin: 0 auto 12px;
  box-shadow: 0 4px 18px rgba(181,168,224,.35);
  cursor: pointer; position: relative; touch-action: manipulation;
}
.p-av-hint {
  position: absolute; bottom: -3px; right: -3px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--dark); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem; border: 2px solid #fff;
}
.p-name { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.2rem; }
.p-age  { font-size:.74rem; color:var(--mid); margin-top:3px; }

/* stats grid */
.sg { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:12px; }
.st {
  background:var(--white); border-radius:14px; border:1.5px solid var(--border);
  padding:13px; text-align:center;
}
.st-n { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.65rem; color:var(--dark); }
.st-l { font-size:.68rem; color:var(--mid); margin-top:3px; font-family:'Nunito',sans-serif; font-weight:700; }

/* subject stat row */
.s-stat { display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--light); }
.s-stat:last-child { border-bottom:none; }
.ss-ic  { font-size:1.2rem; width:28px; text-align:center; flex-shrink:0; }
.ss-inf { flex:1; min-width:0; }
.ss-inf h5    { font-family:'Nunito',sans-serif; font-weight:800; font-size:.84rem; }
.ss-inf .ss-s { font-size:.7rem; color:var(--mid); }
.ss-bar-w { width:100%; height:5px; background:var(--light); border-radius:99px; margin-top:4px; overflow:hidden; }
.ss-bar   { height:100%; border-radius:99px; transition:width .8s ease; }
.ss-pct   { font-family:'Nunito',sans-serif; font-weight:900; font-size:.9rem; flex-shrink:0; }

/* card heading */
.ch { font-family:'Nunito',sans-serif; font-weight:800; font-size:.94rem; margin-bottom:13px; }

/* danger */
.danger {
  background:#fff8f8; border:1.5px solid rgba(244,124,124,.22);
  border-radius:16px; padding:15px; margin-top:4px;
}
.danger h4 { font-family:'Nunito',sans-serif; font-weight:800; font-size:.84rem; color:var(--err); margin-bottom:11px; }

/* wrong summary row */
.wr-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid var(--light);
}
.wr-row:last-child { border-bottom:none; }
</style>
</head>
<body>
<div class="page prof-pg">
  <div class="navbar">
    <a class="back-btn" href="index.html">←</a>
    <span style="font-family:'Nunito',sans-serif;font-weight:800">Profilim 👤</span>
    <div style="width:40px"></div>
  </div>

  <!-- Hero -->
  <div class="p-hero fade-up">
    <div class="p-av" id="p-av" onclick="openIconPicker(_pickerIcon, onProfilePick)">
      😊
      <div class="p-av-hint">✏️</div>
    </div>
    <div class="p-name" id="p-name">—</div>
    <div class="p-age"  id="p-age">—</div>
  </div>

  <!-- Stats -->
  <div class="sg fade-up" id="sg" style="animation-delay:.05s"></div>

  <!-- Edit -->
  <div class="card fade-up" style="animation-delay:.1s">
    <div class="ch">✏️ Bilgileri Düzenle</div>

    <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:.65rem;color:var(--mid);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">Profil İkonu</div>
    <div class="icon-pick-row" onclick="openIconPicker(_pickerIcon, onProfilePick)">
      <div class="ipr-face" id="p-pick-face">😊</div>
      <div class="ipr-info"><b id="p-pick-name">Gülümseyen</b><span>Değiştirmek için dokun</span></div>
      <span style="color:var(--mid)">›</span>
    </div>

    <div class="field">
      <label>Adın</label>
      <input id="e-name" type="text" placeholder="Adın…" autocorrect="off"/>
    </div>
    <div class="field">
      <label>Yaşın</label>
      <input id="e-age" type="number" inputmode="numeric" min="1" max="99" placeholder="Yaşın…"/>
    </div>
    <button class="btn btn-mint" onclick="saveProfile()">💾 Kaydet</button>
  </div>

  <!-- Subject stats -->
  <div class="card fade-up" style="animation-delay:.15s">
    <div class="ch">📊 Konu Başarıları</div>
    <div id="subj-stats"><p style="font-size:.82rem;color:var(--mid)">Henüz test çözmedin.</p></div>
  </div>

  <!-- Wrong summary -->
  <div class="card fade-up" style="animation-delay:.2s">
    <div class="ch">❌ Birikmiş Yanlışlar</div>
    <div id="wrong-sum"></div>
  </div>

  <!-- Danger -->
  <div class="danger fade-up" style="animation-delay:.25s">
    <h4>⚠️ Tehlikeli Bölge</h4>
    <button class="btn btn-ghost" onclick="clearWrong()"
      style="margin-bottom:8px;border-color:rgba(244,124,124,.3);color:var(--err)">🗑 Yanlış Listesini Sıfırla</button>
    <button class="btn btn-ghost" onclick="clearAll()"
      style="border-color:rgba(244,124,124,.3);color:var(--err)">💀 Tüm Verileri Sil</button>
  </div>
</div>

<nav class="bnav">
  <a href="index.html"><span class="ni">🏠</span>Ana Sayfa</a>
  <a href="cards.html"><span class="ni">🃏</span>Kartlar</a>
  <a href="test.html"><span class="ni">📝</span>Test</a>
  <a href="profile.html" class="active"><span class="ni">👤</span>Profil</a>
</nav>

<script>
if (!SD.requireUser()) {}

let _selIcon = '😊', _selName = 'Gülümseyen';

window.addEventListener('DOMContentLoaded', renderProfile);

function onProfilePick(em, name) {
  _selIcon = em; _selName = name;
  // Update hero avatar
  const av = document.getElementById('p-av');
  av.innerHTML = em + '<div class="p-av-hint">✏️</div>';
  // Update picker row
  document.getElementById('p-pick-face').textContent = em;
  document.getElementById('p-pick-name').textContent = name;
}

function renderProfile() {
  const user = SD.getUser(); if (!user) return;

  _selIcon = user.icon || '😊';
  _selName = user.iconName || 'Gülümseyen';
  _pickerIcon = _selIcon;

  // Hero
  const av = document.getElementById('p-av');
  av.innerHTML = _selIcon + '<div class="p-av-hint">✏️</div>';
  document.getElementById('p-name').textContent = user.name;
  document.getElementById('p-age').textContent  = user.age + ' yaşında';

  // Edit fields
  document.getElementById('e-name').value = user.name;
  document.getElementById('e-age').value  = user.age;
  document.getElementById('p-pick-face').textContent = _selIcon;
  document.getElementById('p-pick-name').textContent = _selName;

  // Stats grid
  const stats = SD.getStats();
  let att=0,tq=0,tc=0;
  Object.values(stats).forEach(s=>{att+=s.attempts;tq+=s.totalQ;tc+=s.totalCorrect;});
  const ovr = tq>0?Math.round(tc/tq*100):0;
  const tw  = SD.totalWrongCount();
  document.getElementById('sg').innerHTML = `
    <div class="st"><div class="st-n">${att}</div><div class="st-l">Test Çözüldü</div></div>
    <div class="st"><div class="st-n" style="color:var(--mint)">${ovr}%</div><div class="st-l">Genel Başarı</div></div>
    <div class="st"><div class="st-n" style="color:var(--ok)">${tc}</div><div class="st-l">Doğru Cevap</div></div>
    <div class="st"><div class="st-n" style="color:var(--err)">${tw}</div><div class="st-l">Biriken Yanlış</div></div>`;

  // Per-subject
  const ssel = document.getElementById('subj-stats');
  if (Object.keys(stats).length) {
    ssel.innerHTML = '';
    SUBJECTS.forEach(s => {
      const st = stats[s.id]; if (!st) return;
      const p = Math.round(st.totalCorrect/st.totalQ*100);
      const col = p>=70?'var(--ok)':p>=50?'var(--peach)':'var(--err)';
      const d = document.createElement('div');
      d.className = 's-stat';
      d.innerHTML = `
        <div class="ss-ic">${s.icon}</div>
        <div class="ss-inf">
          <h5>${s.title}</h5>
          <div class="ss-s">${st.attempts} deneme · ${st.totalCorrect}/${st.totalQ} doğru</div>
          <div class="ss-bar-w"><div class="ss-bar" style="width:${p}%;background:${col}"></div></div>
        </div>
        <div class="ss-pct" style="color:${col}">${p}%</div>`;
      ssel.appendChild(d);
    });
  }

  // Wrong summary
  const wel = document.getElementById('wrong-sum');
  const allW = SD.getWrong();
  const wSubs = Object.entries(allW).filter(([,ids])=>ids.length>0);
  if (!wSubs.length) {
    wel.innerHTML = '<p style="font-size:.82rem;color:var(--mid)">Hiç birikmiş yanlışın yok! 🎉</p>';
  } else {
    wel.innerHTML = '';
    wSubs.forEach(([sid,ids]) => {
      const sub = SUBJECTS.find(s=>s.id===sid); if (!sub) return;
      const d = document.createElement('div');
      d.className = 'wr-row';
      d.innerHTML = `
        <span style="font-weight:600;font-size:.84rem">${sub.icon} ${sub.title}</span>
        <div style="display:flex;align-items:center;gap:7px">
          <span class="chip chip-err">${ids.length} soru</span>
          <a href="test.html?subject=${sid}&wrong=1" class="btn btn-ghost btn-sm" style="width:auto;padding:7px 12px">Çalış</a>
        </div>`;
      wel.appendChild(d);
    });
  }
}

function saveProfile() {
  const name = document.getElementById('e-name').value.trim();
  const age  = parseInt(document.getElementById('e-age').value);
  if (!name || !age) { showToast('Tüm alanları doldur!'); return; }
  SD.setUser({ name, age, icon: _selIcon, iconName: _selName });
  renderProfile();
  showToast('Profil kaydedildi! ✅');
}

function clearWrong() {
  if (!confirm('Tüm birikmiş yanlışlar silinecek. Emin misin?')) return;
  SD.del('sd_wrong'); renderProfile(); showToast('Yanlış listesi temizlendi!');
}
function clearAll() {
  if (!confirm('TÜM veriler silinecek. Geri alınamaz!')) return;
  ['sd_user','sd_wrong','sd_stats','sd_fc','sd_session'].forEach(k => SD.del(k));
  window.location.href = 'index.html';
}
</script>
</body>
</html>
