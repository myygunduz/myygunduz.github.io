<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — StudyDeck</title>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
.test-page { padding-bottom: 20px; }

.test-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }

.test-progress { margin-bottom: 16px; }
.tp-bar { height: 8px; background: var(--light); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.tp-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--lav)); border-radius: 99px; transition: width 0.4s; }
.tp-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--mid); font-family: 'Nunito', sans-serif; font-weight: 600; }

.nav-dots { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
.nav-dot {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 700;
  font-size: 0.68rem; cursor: pointer;
  background: white; color: var(--mid);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
.nav-dot.answered-correct { background: var(--correct); color: white; border-color: var(--correct); }
.nav-dot.answered-wrong   { background: var(--wrong);   color: white; border-color: var(--wrong);   }
.nav-dot.skipped          { background: var(--lav);     color: white; border-color: var(--lav);     }
.nav-dot.current          { outline: 2.5px solid var(--dark); outline-offset: 2px; }

.q-card { animation: fadeUp 0.28s cubic-bezier(.4,0,.2,1) both; }
.q-num-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.q-num {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--lav); color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem; flex-shrink: 0;
}
.q-subject-tag { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.72rem; padding: 3px 10px; border-radius: 99px; margin-left: auto; }
.question-text { font-size: 1.05rem; font-weight: 600; line-height: 1.55; margin-bottom: 20px; }

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.option {
  padding: 14px 18px; border: 1.5px solid var(--border);
  border-radius: 14px; cursor: pointer; background: white;
  display: flex; align-items: center; gap: 12px; transition: all 0.18s;
}
.option:hover:not(.locked) { border-color: var(--lav); background: #f8f6ff; transform: translateX(4px); }
.option .opt-ltr {
  width: 30px; height: 30px; border-radius: 9px; background: var(--light);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.8rem; color: var(--mid);
  flex-shrink: 0; transition: all 0.18s;
}
.option .opt-text { font-size: 0.9rem; line-height: 1.4; }
.option.correct { border-color: var(--correct); background: #f2fdf6; }
.option.correct .opt-ltr { background: var(--correct); color: white; }
.option.wrong   { border-color: var(--wrong);   background: #fff4f4; }
.option.wrong   .opt-ltr { background: var(--wrong);   color: white; }
.option.locked  { cursor: default; }

.feedback { border-radius: 14px; padding: 14px 16px; font-size: 0.875rem; line-height: 1.6; display: none; margin-bottom: 16px; animation: fadeUp 0.25s ease both; }
.feedback.show    { display: block; }
.feedback.fb-correct { background: #f0fdf6; border: 1px solid #b8edcc; color: #1f6b3c; }
.feedback.fb-wrong   { background: #fff4f4; border: 1px solid #f4c8c8; color: #8b2020; }
.feedback.fb-skip    { background: #f8f6ff; border: 1px solid #d8d0f8; color: #5040a0; }
.feedback strong { font-family: 'Nunito', sans-serif; font-weight: 800; }

.action-row { display: flex; gap: 10px; }
.action-row .btn { flex: 1; }

/* Intro */
.test-intro { text-align: center; padding: 20px 0; }
.intro-icon  { font-size: 4rem; margin-bottom: 16px; }
.intro-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.5rem; margin-bottom: 6px; }
.intro-desc  { font-size: 0.85rem; color: var(--mid); margin-bottom: 28px; }

.subject-select { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.ss-item {
  padding: 16px 18px; background: white; border-radius: 16px;
  border: 1.5px solid var(--border); cursor: pointer;
  display: flex; align-items: center; gap: 14px; transition: all 0.18s;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
}
.ss-item:hover, .ss-item.selected { border-color: var(--mint); background: rgba(126,206,196,0.06); }
.ss-item.selected::after { content: '✓'; margin-left: auto; color: var(--mint); font-size: 1.1rem; }

/* Confirm overlay */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(30,30,42,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 24px; backdrop-filter: blur(4px);
}
.confirm-box {
  background: white; border-radius: 24px; padding: 28px 24px;
  max-width: 340px; width: 100%; box-shadow: var(--shadow-lg); text-align: center;
}
.confirm-box h3 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.1rem; margin-bottom: 8px; }
.confirm-box p  { font-size: 0.85rem; color: var(--mid); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { flex: 1; }
</style>
</head>
<body>
<div class="page test-page">
  <div class="test-topbar">
    <button class="back-btn" onclick="handleBack()">←</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" id="btn-finish" onclick="finishTest()"
      style="display:none; width:auto; padding:9px 18px;">Bitir & Sonuç</button>
  </div>

  <!-- INTRO -->
  <div id="view-intro">
    <div class="test-intro fade-up">
      <div class="intro-icon">📝</div>
      <div class="intro-title">Test Modu</div>
      <div class="intro-desc">Bir konu seç ve teste başla.<br>İstediğin soruyu boş bırakabilirsin.</div>
    </div>
    <div class="subject-select" id="ss-list"></div>
    <button class="btn btn-dark" onclick="beginTest(false)">Teste Başla ▶</button>
    <button class="btn btn-ghost" id="btn-wrong-intro" onclick="beginTest(true)"
      style="display:none; margin-top:10px;">❌ Sadece Yanlışlarımla</button>
  </div>

  <!-- TEST -->
  <div id="view-test" style="display:none;">
    <div class="nav-dots" id="nav-dots"></div>
    <div class="test-progress">
      <div class="tp-bar"><div class="tp-fill" id="tp-fill" style="width:0%"></div></div>
      <div class="tp-labels">
        <span id="tp-msg">Hadi başla!</span>
        <span id="tp-count">0/0</span>
      </div>
    </div>
    <div class="card q-card" id="q-card">
      <div class="q-num-row">
        <div class="q-num" id="q-num">1</div>
        <div class="q-subject-tag" id="q-subject-tag"></div>
      </div>
      <div class="question-text" id="q-text">—</div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-ghost" id="btn-skip" onclick="skipQuestion()">Boş Bırak</button>
        <button class="btn btn-mint"  id="btn-next" onclick="nextQuestion()" style="display:none;">Sonraki →</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm leave -->
<div class="confirm-overlay" id="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <h3>Testi bırakmak istiyor musun?</h3>
    <p>İlerlemeyi kaydederek çıkabilir, daha sonra kaldığın yerden devam edebilirsin.</p>
    <div class="confirm-btns" style="flex-wrap:wrap; gap:8px;">
      <button class="btn btn-ghost" onclick="closeConfirm()" style="flex:1 1 100%;">Devam Et</button>
      <button class="btn btn-mint"  onclick="saveAndLeave()" style="flex:1;">💾 Kaydet & Çık</button>
      <button class="btn btn-dark"  onclick="leaveTest()"    style="flex:1;">Kaydetme & Çık</button>
    </div>
  </div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav" id="bottom-nav">
  <a id="nav-home"    href="index.html" ><span class="nav-icon">🏠</span>Ana Sayfa</a>
  <a id="nav-cards"   href="cards.html" ><span class="nav-icon">🃏</span>Kartlar</a>
  <a id="nav-test"    href="test.html"  class="active"><span class="nav-icon">📝</span>Test</a>
  <a id="nav-profile" href="profile.html"><span class="nav-icon">👤</span>Profil</a>
</nav>

<script>
if (!SD.requireUser()) {}

// ── State ──────────────────────────────────────────────────
let questions = [], currentQ = 0, answers = {};
let selectedSubjectId = null, wrongOnlyMode = false, subjectData = null;
let testActive = false;

// ── Boot ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderSubjectSelect();

  // Check for saved draft
  const draft = SD.get('sd_test_draft', null);
  if (draft) {
    showResumeBanner(draft);
  }

  const p = new URLSearchParams(location.search);
  if (p.get('subject')) {
    selectSubjectById(p.get('subject'));
    beginTest(!!p.get('wrong'));
  }
});

// ── Nav lock/unlock during test ────────────────────────────
const NAV_IDS = ['nav-home','nav-cards','nav-test','nav-profile'];
const NAV_HREFS = {
  'nav-home':    'index.html',
  'nav-cards':   'cards.html',
  'nav-test':    'test.html',
  'nav-profile': 'profile.html'
};

function lockNav() {
  NAV_IDS.forEach(id => {
    const el = document.getElementById(id);
    el.removeAttribute('href');
    el.onclick = e => { e.preventDefault(); showConfirm(); };
  });
}
function unlockNav() {
  NAV_IDS.forEach(id => {
    const el = document.getElementById(id);
    el.href = NAV_HREFS[id];
    el.onclick = null;
  });
}

function handleBack() {
  if (testActive) showConfirm();
  else history.back();
}
function showConfirm()  { document.getElementById('confirm-overlay').style.display = 'flex'; }
function closeConfirm() { document.getElementById('confirm-overlay').style.display = 'none'; }

function saveAndLeave() {
  // Save current test state
  SD.set('sd_test_draft', {
    subjectId: selectedSubjectId,
    wrongOnly: wrongOnlyMode,
    questionIds: questions.map(q => q.id),
    answers,
    currentQ
  });
  testActive = false;
  unlockNav();
  window.location.href = 'index.html';
}

function leaveTest() {
  SD.del('sd_test_draft');
  testActive = false;
  unlockNav();
  window.location.href = 'index.html';
}

// ── Resume banner ──────────────────────────────────────────
function showResumeBanner(draft) {
  const sub = SUBJECTS.find(s => s.id === draft.subjectId);
  if (!sub) { SD.del('sd_test_draft'); return; }
  const answered = Object.keys(draft.answers).length;
  const total    = draft.questionIds.length;

  const banner = document.createElement('div');
  banner.id = 'resume-banner';
  banner.style.cssText = `
    background: linear-gradient(135deg,rgba(126,206,196,0.15),rgba(181,168,224,0.15));
    border: 1.5px solid var(--mint); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  `;
  banner.innerHTML = `
    <span style="font-size:1.4rem">📝</span>
    <div style="flex:1; min-width:0;">
      <div style="font-family:'Nunito',sans-serif; font-weight:800; font-size:0.88rem;">Yarım kalan test</div>
      <div style="font-size:0.75rem; color:var(--mid); margin-top:2px;">${sub.icon} ${sub.title} · ${answered}/${total} cevaplandı</div>
    </div>
    <button id="btn-resume-test" class="btn btn-mint btn-sm" style="white-space:nowrap;">Devam Et →</button>
    <button id="btn-discard-test" class="btn btn-ghost btn-sm" style="white-space:nowrap;">Sil</button>
  `;
  const intro = document.getElementById('view-intro');
  intro.insertBefore(banner, intro.firstChild);

  document.getElementById('btn-resume-test').onclick = () => resumeTest(draft);
  document.getElementById('btn-discard-test').onclick = () => {
    SD.del('sd_test_draft');
    banner.remove();
  };
}

function resumeTest(draft) {
  const sub = SUBJECTS.find(s => s.id === draft.subjectId);
  if (!sub) return;

  selectedSubjectId = draft.subjectId;
  subjectData       = sub;
  wrongOnlyMode     = draft.wrongOnly;
  answers           = draft.answers || {};
  currentQ          = draft.currentQ || 0;

  // Rebuild questions array from saved IDs
  questions = draft.questionIds
    .map(id => sub.questions.find(q => q.id === id))
    .filter(Boolean);

  if (questions.length === 0) { SD.del('sd_test_draft'); return; }

  SD.del('sd_test_draft');

  testActive = true;
  lockNav();

  document.getElementById('view-intro').style.display = 'none';
  document.getElementById('view-test').style.display  = 'block';
  document.getElementById('btn-finish').style.display = 'flex';

  buildNavDots();
  // Restore dot colors for already-answered questions
  Object.keys(answers).forEach(i => refreshDot(parseInt(i)));
  renderQuestion(currentQ);
}

// ── Intro ──────────────────────────────────────────────────
function renderSubjectSelect() {
  const list = document.getElementById('ss-list');
  list.innerHTML = '';
  SUBJECTS.forEach(s => {
    const wc = SD.getWrongForSubject(s.id).length;
    const div = document.createElement('div');
    div.className = 'ss-item';
    div.dataset.id = s.id;
    div.innerHTML = `<span style="font-size:1.3rem">${s.icon}</span> ${s.title}
      ${wc > 0 ? `<span class="chip chip-wrong" style="margin-left:auto">❌ ${wc}</span>` : ''}`;
    div.onclick = () => selectSubjectById(s.id);
    list.appendChild(div);
  });
}

function selectSubjectById(sid) {
  selectedSubjectId = sid;
  document.querySelectorAll('.ss-item').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === sid));
  const wc  = SD.getWrongForSubject(sid).length;
  const btn = document.getElementById('btn-wrong-intro');
  btn.style.display = wc > 0 ? 'flex' : 'none';
  btn.textContent   = `❌ Sadece Yanlışlarımla (${wc} soru)`;
}

// ── Begin ──────────────────────────────────────────────────
function beginTest(wrongOnly) {
  if (!selectedSubjectId) { showToast('Önce bir konu seç! 😊'); return; }
  subjectData   = SUBJECTS.find(s => s.id === selectedSubjectId);
  wrongOnlyMode = wrongOnly;

  if (wrongOnly) {
    const wids = SD.getWrongForSubject(selectedSubjectId);
    if (!wids.length) { showToast('Hiç yanlışın yok! 🎉'); return; }
    questions = SD.shuffle(subjectData.questions.filter(q => wids.includes(q.id)));
  } else {
    questions = SD.shuffle([...subjectData.questions]);
  }

  currentQ = 0; answers = {};
  testActive = true;
  lockNav();

  document.getElementById('view-intro').style.display = 'none';
  document.getElementById('view-test').style.display  = 'block';
  document.getElementById('btn-finish').style.display = 'flex';

  buildNavDots();
  renderQuestion(0);
}

// ── Nav dots ───────────────────────────────────────────────
// Built ONCE. Colors updated individually — never rebuilt.
function buildNavDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === 0 ? ' current' : '');
    d.id = 'dot-' + i;
    d.textContent = i + 1;
    d.onclick = () => jumpTo(i);
    wrap.appendChild(d);
  });
}

// Update a single dot's color class — does NOT touch other dots
function refreshDot(i) {
  const d = document.getElementById('dot-' + i);
  if (!d) return;
  d.classList.remove('answered-correct', 'answered-wrong', 'skipped');
  const a = answers[i];
  if (a === undefined) return;
  if (a === null)                    d.classList.add('skipped');
  else if (a === questions[i].correct) d.classList.add('answered-correct');
  else                               d.classList.add('answered-wrong');
}

// Only toggle the "current" outline, leave color classes intact
function setCurrentDot(i) {
  document.querySelectorAll('.nav-dot').forEach((d, idx) =>
    d.classList.toggle('current', idx === i));
}

function jumpTo(i) {
  currentQ = i;
  setCurrentDot(i);   // only moves the outline
  renderQuestion(i);
}

// ── Render question ────────────────────────────────────────
function renderQuestion(i) {
  const q = questions[i];

  // Replay animation
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';

  document.getElementById('q-num').textContent = i + 1;

  const tag = document.getElementById('q-subject-tag');
  tag.textContent = subjectData.icon + ' ' + subjectData.title;
  tag.style.background = subjectData.color + '22';
  tag.style.color = subjectData.color;

  document.getElementById('q-text').textContent = q.question;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  q.options.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.id = `opt-${i}-${oi}`;
    div.innerHTML = `<span class="opt-ltr">${String.fromCharCode(65+oi)}</span><span class="opt-text">${opt}</span>`;
    div.onclick = () => selectAnswer(i, oi);
    optList.appendChild(div);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.innerHTML = '';
  document.getElementById('btn-skip').style.display = 'flex';
  document.getElementById('btn-next').style.display = 'none';

  if (answers[i] !== undefined) restoreAnswerState(i);
  updateProgressBar();
  setCurrentDot(i);
}

// ── Select ─────────────────────────────────────────────────
function selectAnswer(qi, oi) {
  if (answers[qi] !== undefined) return;
  const q = questions[qi];
  answers[qi] = oi;
  const isCorrect = oi === q.correct;

  for (let k = 0; k < q.options.length; k++) {
    const el = document.getElementById(`opt-${qi}-${k}`);
    if (!el) continue;
    el.classList.add('locked');
    if (k === q.correct)        el.classList.add('correct');
    if (k === oi && !isCorrect) el.classList.add('wrong');
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = isCorrect
    ? `<strong>✅ Doğru!</strong> Harikasın.`
    : `<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;

  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent =
    qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';

  refreshDot(qi);        // colour THIS dot
  updateProgressBar();
}

function restoreAnswerState(qi) {
  const q = questions[qi], chosen = answers[qi];
  for (let k = 0; k < q.options.length; k++) {
    const el = document.getElementById(`opt-${qi}-${k}`);
    if (!el) continue;
    el.classList.add('locked');
    if (k === q.correct) el.classList.add('correct');
    if (chosen !== null && k === chosen && chosen !== q.correct) el.classList.add('wrong');
  }
  const fb = document.getElementById('feedback');
  if (chosen === null) {
    fb.className = 'feedback show fb-skip';
    fb.innerHTML = `<strong>⏭ Boş bıraktın.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong>`;
  } else if (chosen === q.correct) {
    fb.className = 'feedback show fb-correct';
    fb.innerHTML = `<strong>✅ Doğru!</strong>`;
  } else {
    fb.className = 'feedback show fb-wrong';
    fb.innerHTML = `<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;
  }
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent =
    qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';
}

// ── Skip ───────────────────────────────────────────────────
function skipQuestion() {
  const qi = currentQ;
  if (answers[qi] !== undefined) return;
  const q = questions[qi];
  answers[qi] = null;

  for (let k = 0; k < q.options.length; k++) {
    const el = document.getElementById(`opt-${qi}-${k}`);
    if (!el) continue;
    el.classList.add('locked');
    if (k === q.correct) el.classList.add('correct');
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show fb-skip';
  fb.innerHTML = `<strong>⏭ Boş bıraktın.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong>`;

  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent =
    qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';

  refreshDot(qi);
  updateProgressBar();
}

// ── Next ───────────────────────────────────────────────────
function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    setCurrentDot(currentQ);
    renderQuestion(currentQ);
  } else {
    finishTest();
  }
}

function updateProgressBar() {
  const answered = Object.keys(answers).length;
  const pct = questions.length > 0 ? answered / questions.length * 100 : 0;
  document.getElementById('tp-fill').style.width = pct + '%';
  document.getElementById('tp-count').textContent = answered + '/' + questions.length;
  const msgs = ['Hadi başla!', 'Süper gidiyorsun!', 'Devam et!', 'Az kaldı!', 'Neredeyse bitti!'];
  document.getElementById('tp-msg').textContent = msgs[Math.min(Math.floor(pct / 25), 4)];
}

// ── Finish — auto-skips unanswered ────────────────────────
function finishTest() {
  closeConfirm();

  // Auto-skip remaining unanswered
  questions.forEach((_, i) => {
    if (answers[i] === undefined) {
      answers[i] = null;
      refreshDot(i);
    }
  });
  updateProgressBar();

  let correct = 0, wrongIds = [], skipped = 0;
  questions.forEach((q, i) => {
    const a = answers[i];
    if (a === null)           { skipped++; wrongIds.push(q.id); }
    else if (a === q.correct) correct++;
    else                      wrongIds.push(q.id);
  });

  SD.addStat(selectedSubjectId, questions.length - skipped, correct);

  const existingWrong = SD.getWrongForSubject(selectedSubjectId);
  let updatedWrong;
  if (wrongOnlyMode) {
    const correctIds = questions.filter((q, i) => answers[i] === q.correct).map(q => q.id);
    updatedWrong = existingWrong.filter(id => !correctIds.includes(id));
    wrongIds.forEach(id => { if (!updatedWrong.includes(id)) updatedWrong.push(id); });
  } else {
    const allIds     = subjectData.questions.map(q => q.id);
    const correctIds = questions.filter((q, i) => answers[i] === q.correct).map(q => q.id);
    updatedWrong     = existingWrong.filter(id => !correctIds.includes(id) && !allIds.includes(id));
    wrongIds.forEach(id => { if (!updatedWrong.includes(id)) updatedWrong.push(id); });
  }
  SD.saveWrongForSubject(selectedSubjectId, updatedWrong);

  SD.setSession({
    subjectId: selectedSubjectId, wrongOnly: wrongOnlyMode,
    total: questions.length, correct, skipped, wrongIds,
    questions: questions.map((q, i) => ({
      question: q.question, options: q.options,
      correct: q.correct, explanation: q.explanation, chosen: answers[i]
    }))
  });

  testActive = false;
  unlockNav();
  window.location.href = 'results.html';
}
</script>
