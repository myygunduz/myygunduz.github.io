<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Test — StudyDeck</title>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
.test-pg { padding-bottom: calc(var(--nb-h) + var(--sb) + 12px); }

/* topbar */
.topbar { display:flex; align-items:center; gap:9px; margin-bottom:14px; }

/* progress */
.tp-wrap { margin-bottom:12px; }
.tp-bar  { height:7px; background:var(--light); border-radius:99px; overflow:hidden; margin-bottom:5px; }
.tp-fill { height:100%; background:linear-gradient(90deg,var(--mint),var(--lav)); border-radius:99px; transition:width .35s; }
.tp-row  { display:flex; justify-content:space-between; font-size:.7rem; color:var(--mid); font-family:'Nunito',sans-serif; font-weight:700; }

/* nav dots */
.dots { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:12px; }
.dot  {
  width:30px; height:30px; border-radius:9px; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:.63rem;
  cursor:pointer; background:var(--white); color:var(--mid);
  transition:background .12s,border-color .12s,color .12s;
  flex-shrink:0; touch-action:manipulation;
}
.dot.ok   { background:var(--ok);  color:#fff; border-color:var(--ok);  }
.dot.err  { background:var(--err); color:#fff; border-color:var(--err); }
.dot.skip { background:var(--lav); color:#fff; border-color:var(--lav); }
.dot.cur  { outline:2.5px solid var(--dark); outline-offset:2px; }

/* question card */
.q-card { animation:fadeUp .26s cubic-bezier(.4,0,.2,1) both; }
.q-hd   { display:flex; align-items:center; gap:9px; margin-bottom:11px; }
.q-num  {
  width:30px; height:30px; border-radius:50%; background:var(--lav); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif; font-weight:900; font-size:.8rem; flex-shrink:0;
}
.q-tag  { font-family:'Nunito',sans-serif; font-weight:700; font-size:.66rem; padding:3px 9px; border-radius:99px; margin-left:auto; }
.q-txt  { font-size:.96rem; font-weight:600; line-height:1.55; margin-bottom:14px; }

/* options */
.opts { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.opt  {
  padding:12px 13px; border:1.5px solid var(--border);
  border-radius:12px; cursor:pointer; background:var(--white);
  display:flex; align-items:center; gap:10px;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
}
.opt:active:not(.locked) { background:var(--light); }
.opt-l {
  width:27px; height:27px; border-radius:8px; background:var(--light);
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif; font-weight:800; font-size:.76rem; color:var(--mid);
  flex-shrink:0; transition:all .13s;
}
.opt-t { font-size:.86rem; line-height:1.4; }
.opt.ok   { border-color:var(--ok);  background:#f1fdf5; }
.opt.ok   .opt-l { background:var(--ok);  color:#fff; }
.opt.err  { border-color:var(--err); background:#fff4f4; }
.opt.err  .opt-l { background:var(--err); color:#fff; }
.opt.locked { cursor:default; }

/* feedback */
.fb { border-radius:11px; padding:11px 13px; font-size:.83rem; line-height:1.6; display:none; margin-bottom:12px; }
.fb.show  { display:block; animation:fadeUp .2s ease both; }
.fb.f-ok  { background:#f0fdf6; border:1px solid #b8edcc; color:#1a6038; }
.fb.f-err { background:#fff4f4; border:1px solid #f4c8c8; color:#8b2020; }
.fb.f-sk  { background:#f8f6ff; border:1px solid #d8d0f8; color:#5040a0; }
.fb strong{ font-family:'Nunito',sans-serif; font-weight:800; }

/* action row */
.act-row { display:flex; gap:8px; }
.act-row .btn { flex:1; padding:13px 8px; font-size:.83rem; }

/* intro */
.intro { text-align:center; padding:18px 0 22px; }
.i-em { font-size:3.2rem; margin-bottom:10px; }
.i-t  { font-family:'Nunito',sans-serif; font-weight:900; font-size:1.22rem; margin-bottom:5px; }
.i-s  { font-size:.8rem; color:var(--mid); margin-bottom:22px; line-height:1.6; }

.ss-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.ss-item {
  padding:13px; background:var(--white); border-radius:13px;
  border:1.5px solid var(--border); cursor:pointer;
  display:flex; align-items:center; gap:11px;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:.86rem;
  touch-action:manipulation;
}
.ss-item:active,.ss-item.on { border-color:var(--mint); background:rgba(126,206,196,.06); }
.ss-item.on::after { content:'✓'; margin-left:auto; color:var(--mint); font-size:.95rem; }
</style>
</head>
<body>
<div class="page test-pg">
  <div class="topbar">
    <button class="back-btn" onclick="handleBack()">←</button>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" id="btn-fin" onclick="finishTest()"
      style="display:none;width:auto">Bitir &amp; Sonuç</button>
  </div>

  <!-- INTRO -->
  <div id="v-intro">
    <div class="intro fade-up">
      <div class="i-em">📝</div>
      <div class="i-t">Test Modu</div>
      <div class="i-s">Bir konu seç ve teste başla.<br>İstediğin soruyu boş bırakabilirsin.</div>
    </div>
    <div class="ss-list" id="ss-list"></div>
    <button class="btn btn-dark"  onclick="beginTest(false)">Teste Başla ▶</button>
    <button class="btn btn-ghost" id="btn-wrong-i" onclick="beginTest(true)" style="display:none;margin-top:9px">❌ Sadece Yanlışlarımla</button>
  </div>

  <!-- TEST -->
  <div id="v-test" style="display:none">
    <div class="dots"   id="dots"></div>
    <div class="tp-wrap">
      <div class="tp-bar"><div class="tp-fill" id="tp-fill" style="width:0%"></div></div>
      <div class="tp-row"><span id="tp-msg">Hadi başla!</span><span id="tp-cnt">0/0</span></div>
    </div>
    <div class="card q-card" id="q-card">
      <div class="q-hd">
        <div class="q-num" id="q-num">1</div>
        <div class="q-tag" id="q-tag"></div>
      </div>
      <div class="q-txt" id="q-txt">—</div>
      <div class="opts"  id="opts"></div>
      <div class="fb"    id="fb"></div>
      <div class="act-row">
        <button class="btn btn-ghost" id="btn-skip" onclick="skipQ()">Boş Bırak</button>
        <button class="btn btn-mint"  id="btn-next" onclick="nextQ()" style="display:none">Sonraki →</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm -->
<div id="conf-ov" style="display:none" class="confirm-ov">
  <div class="confirm-box">
    <h3>Testi bırakmak istiyor musun?</h3>
    <p>Cevaplanmayan sorular otomatik boş sayılır ve sonuç gösterilir.</p>
    <div class="confirm-row">
      <button class="btn btn-ghost" onclick="closeConf()">Devam Et</button>
      <button class="btn btn-peach" onclick="finishTest()">Bitir &amp; Sonuç</button>
      <button class="btn btn-dark"  onclick="leaveTest()">Çık</button>
    </div>
  </div>
</div>

<nav class="bnav">
  <a id="n-home"    href="index.html"><span class="ni">🏠</span>Ana Sayfa</a>
  <a id="n-cards"   href="cards.html"><span class="ni">🃏</span>Kartlar</a>
  <a id="n-test"    href="test.html" class="active"><span class="ni">📝</span>Test</a>
  <a id="n-profile" href="profile.html"><span class="ni">👤</span>Profil</a>
</nav>

<script>
if (!SD.requireUser()) {}

let Qs=[], cur=0, ans={}, selSub=null, wrongOnly=false, subD=null, alive=false;
const NAVS=['n-home','n-cards','n-test','n-profile'];
const HREFS={'n-home':'index.html','n-cards':'cards.html','n-test':'test.html','n-profile':'profile.html'};

function lockNav(){alive=true;NAVS.forEach(id=>{const e=document.getElementById(id);e.removeAttribute('href');e.onclick=ev=>{ev.preventDefault();showConf();};});}
function unlockNav(){alive=false;NAVS.forEach(id=>{const e=document.getElementById(id);e.href=HREFS[id];e.onclick=null;});}
function handleBack(){if(alive)showConf();else history.back();}
function showConf(){document.getElementById('conf-ov').style.display='flex';}
function closeConf(){document.getElementById('conf-ov').style.display='none';}
function leaveTest(){unlockNav();window.location.href='index.html';}

window.addEventListener('DOMContentLoaded',()=>{
  buildSS();
  const p=new URLSearchParams(location.search);
  if(p.get('subject')){selectSub(p.get('subject'));beginTest(!!p.get('wrong'));}
});

function buildSS(){
  const l=document.getElementById('ss-list');l.innerHTML='';
  SUBJECTS.forEach(s=>{
    const wc=SD.getWrongForSubject(s.id).length;
    const d=document.createElement('div');d.className='ss-item';d.dataset.id=s.id;
    d.innerHTML=`<span style="font-size:1.25rem">${s.icon}</span>${s.title}${wc>0?`<span class="chip chip-err" style="margin-left:auto">❌ ${wc}</span>`:''}`;
    d.onclick=()=>selectSub(s.id);l.appendChild(d);
  });
}

function selectSub(sid){
  selSub=sid;
  document.querySelectorAll('.ss-item').forEach(e=>e.classList.toggle('on',e.dataset.id===sid));
  const wc=SD.getWrongForSubject(sid).length;
  const b=document.getElementById('btn-wrong-i');
  b.style.display=wc>0?'flex':'none';
  b.textContent=`❌ Sadece Yanlışlarımla (${wc} soru)`;
}

function beginTest(wo){
  if(!selSub){showToast('Önce bir konu seç! 😊');return;}
  subD=SUBJECTS.find(s=>s.id===selSub);wrongOnly=wo;
  if(wo){
    const wids=SD.getWrongForSubject(selSub);
    if(!wids.length){showToast('Hiç yanlışın yok! 🎉');return;}
    Qs=SD.shuffle(subD.questions.filter(q=>wids.includes(q.id)));
  } else {
    Qs=SD.shuffle([...subD.questions]);
  }
  cur=0;ans={};
  lockNav();
  document.getElementById('v-intro').style.display='none';
  document.getElementById('v-test').style.display='block';
  document.getElementById('btn-fin').style.display='flex';
  buildDots();renderQ(0);
}

/* ─ Dots — built once, updated in place ─ */
function buildDots(){
  const w=document.getElementById('dots');w.innerHTML='';
  Qs.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' cur':'');d.id='d'+i;d.textContent=i+1;
    d.onclick=()=>jump(i);w.appendChild(d);
  });
}
function refreshDot(i){
  const d=document.getElementById('d'+i);if(!d)return;
  d.classList.remove('ok','err','skip');
  const a=ans[i];
  if(a===undefined)return;
  if(a===null)d.classList.add('skip');
  else if(a===Qs[i].correct)d.classList.add('ok');
  else d.classList.add('err');
}
function setCur(i){document.querySelectorAll('.dot').forEach((d,k)=>d.classList.toggle('cur',k===i));}
function jump(i){cur=i;setCur(i);renderQ(i);}

/* ─ Render ─ */
function renderQ(i){
  const q=Qs[i];
  const c=document.getElementById('q-card');
  c.style.animation='none';void c.offsetHeight;c.style.animation='';
  document.getElementById('q-num').textContent=i+1;
  const tag=document.getElementById('q-tag');
  tag.textContent=subD.icon+' '+subD.title;
  tag.style.background=subD.color+'1e';tag.style.color=subD.color;
  document.getElementById('q-txt').textContent=q.question;
  const ol=document.getElementById('opts');ol.innerHTML='';
  q.options.forEach((o,k)=>{
    const d=document.createElement('div');d.className='opt';d.id=`o${i}-${k}`;
    d.innerHTML=`<span class="opt-l">${String.fromCharCode(65+k)}</span><span class="opt-t">${o}</span>`;
    d.onclick=()=>pick(i,k);ol.appendChild(d);
  });
  const fb=document.getElementById('fb');fb.className='fb';fb.innerHTML='';
  document.getElementById('btn-skip').style.display='flex';
  document.getElementById('btn-next').style.display='none';
  if(ans[i]!==undefined)restore(i);
  updateTP();setCur(i);
}

function pick(qi,k){
  if(ans[qi]!==undefined)return;
  const q=Qs[qi];ans[qi]=k;const ok=k===q.correct;
  for(let j=0;j<q.options.length;j++){
    const e=document.getElementById(`o${qi}-${j}`);if(!e)continue;
    e.classList.add('locked');
    if(j===q.correct)e.classList.add('ok');
    if(j===k&&!ok)e.classList.add('err');
  }
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'f-ok':'f-err');
  fb.innerHTML=ok?`<strong>✅ Doğru!</strong> Harikasın.`
    :`<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-next').style.display='flex';
  document.getElementById('btn-next').textContent=qi<Qs.length-1?'Sonraki →':'Sonuçları Gör 🏁';
  refreshDot(qi);updateTP();
}

function restore(qi){
  const q=Qs[qi],c=ans[qi];
  for(let j=0;j<q.options.length;j++){
    const e=document.getElementById(`o${qi}-${j}`);if(!e)continue;
    e.classList.add('locked');
    if(j===q.correct)e.classList.add('ok');
    if(c!==null&&j===c&&c!==q.correct)e.classList.add('err');
  }
  const fb=document.getElementById('fb');
  if(c===null){fb.className='fb show f-sk';fb.innerHTML=`<strong>⏭ Boş bıraktın.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong>`;}
  else if(c===q.correct){fb.className='fb show f-ok';fb.innerHTML='<strong>✅ Doğru!</strong>';}
  else{fb.className='fb show f-err';fb.innerHTML=`<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;}
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-next').style.display='flex';
  document.getElementById('btn-next').textContent=qi<Qs.length-1?'Sonraki →':'Sonuçları Gör 🏁';
}

function skipQ(){
  const qi=cur;if(ans[qi]!==undefined)return;
  const q=Qs[qi];ans[qi]=null;
  for(let j=0;j<q.options.length;j++){const e=document.getElementById(`o${qi}-${j}`);if(!e)continue;e.classList.add('locked');if(j===q.correct)e.classList.add('ok');}
  const fb=document.getElementById('fb');fb.className='fb show f-sk';
  fb.innerHTML=`<strong>⏭ Boş bıraktın.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong>`;
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-next').style.display='flex';
  document.getElementById('btn-next').textContent=qi<Qs.length-1?'Sonraki →':'Sonuçları Gör 🏁';
  refreshDot(qi);updateTP();
}

function nextQ(){
  if(cur<Qs.length-1){cur++;setCur(cur);renderQ(cur);}else finishTest();
}

function updateTP(){
  const n=Object.keys(ans).length,pct=Qs.length>0?n/Qs.length*100:0;
  document.getElementById('tp-fill').style.width=pct+'%';
  document.getElementById('tp-cnt').textContent=n+'/'+Qs.length;
  const m=['Hadi başla!','Süper gidiyorsun!','Devam et!','Az kaldı!','Neredeyse bitti!'];
  document.getElementById('tp-msg').textContent=m[Math.min(Math.floor(pct/25),4)];
}

function finishTest(){
  closeConf();
  Qs.forEach((_,i)=>{if(ans[i]===undefined){ans[i]=null;refreshDot(i);}});
  updateTP();
  let cor=0,wids=[],sk=0;
  Qs.forEach((q,i)=>{const a=ans[i];if(a===null){sk++;wids.push(q.id);}else if(a===q.correct)cor++;else wids.push(q.id);});
  SD.addStat(selSub,Qs.length-sk,cor);
  const ew=SD.getWrongForSubject(selSub);let uw;
  if(wrongOnly){
    const cids=Qs.filter((q,i)=>ans[i]===q.correct).map(q=>q.id);
    uw=ew.filter(id=>!cids.includes(id));
    wids.forEach(id=>{if(!uw.includes(id))uw.push(id);});
  } else {
    const aids=subD.questions.map(q=>q.id);
    const cids=Qs.filter((q,i)=>ans[i]===q.correct).map(q=>q.id);
    uw=ew.filter(id=>!cids.includes(id)&&!aids.includes(id));
    wids.forEach(id=>{if(!uw.includes(id))uw.push(id);});
  }
  SD.saveWrongForSubject(selSub,uw);
  SD.setSession({subjectId:selSub,wrongOnly,total:Qs.length,correct:cor,skipped:sk,wrongIds:wids,
    questions:Qs.map((q,i)=>({question:q.question,options:q.options,correct:q.correct,explanation:q.explanation,chosen:ans[i]}))});
  unlockNav();
  window.location.href='results.html';
}
</script>
</body>
</html>
