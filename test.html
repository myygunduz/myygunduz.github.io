<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — StudyDeck</title>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
.test-page { padding-bottom: 100px; }

/* Top bar */
.test-topbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.test-topbar .btn-ghost { width: auto; padding: 9px 18px; }

/* Progress */
.test-progress { margin-bottom: 24px; }
.tp-bar { height: 8px; background: var(--light); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.tp-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--lav)); border-radius: 99px; transition: width 0.4s; }
.tp-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--mid); font-family: 'Nunito', sans-serif; font-weight: 600; }

/* Question wrapper - single question at a time */
.question-wrap {
  animation: fadeUp 0.3s cubic-bezier(.4,0,.2,1) both;
}
.q-num-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.q-num {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--lav); color: white;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem;
  flex-shrink: 0;
}
.q-subject-tag {
  font-family: 'Nunito', sans-serif; font-weight: 700;
  font-size: 0.72rem; padding: 3px 10px;
  border-radius: 99px; margin-left: auto;
}
.question-text {
  font-size: 1.05rem; font-weight: 600; line-height: 1.55;
  margin-bottom: 20px;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.option {
  padding: 14px 18px; border: 1.5px solid var(--border);
  border-radius: 14px; cursor: pointer; background: white;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.18s; position: relative; overflow: hidden;
}
.option:hover:not(.locked) { border-color: var(--lav); background: #f8f6ff; transform: translateX(4px); }
.option .opt-ltr {
  width: 30px; height: 30px; border-radius: 9px;
  background: var(--light); display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 0.8rem; color: var(--mid); flex-shrink: 0;
  transition: all 0.18s;
}
.option .opt-text { font-size: 0.9rem; line-height: 1.4; }

.option.correct { border-color: var(--correct); background: #f2fdf6; }
.option.correct .opt-ltr { background: var(--correct); color: white; }
.option.wrong { border-color: var(--wrong); background: #fff4f4; }
.option.wrong .opt-ltr { background: var(--wrong); color: white; }
.option.locked { cursor: default; }

/* Feedback */
.feedback {
  border-radius: 14px; padding: 14px 16px;
  font-size: 0.875rem; line-height: 1.6;
  display: none; margin-bottom: 16px;
  animation: fadeUp 0.25s ease both;
}
.feedback.show { display: block; }
.feedback.fb-correct { background: #f0fdf6; border: 1px solid #b8edcc; color: #1f6b3c; }
.feedback.fb-wrong { background: #fff4f4; border: 1px solid #f4c8c8; color: #8b2020; }
.feedback.fb-skip { background: #f8f6ff; border: 1px solid #d8d0f8; color: #5040a0; }
.feedback strong { font-family: 'Nunito', sans-serif; font-weight: 800; }

/* Action row */
.action-row { display: flex; gap: 10px; }
.action-row .btn { flex: 1; }

/* Nav dots */
.nav-dots {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; margin-bottom: 20px;
}
.nav-dot {
  width: 26px; height: 26px; border-radius: 8px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 700;
  font-size: 0.68rem; cursor: pointer;
  background: white; color: var(--mid);
  transition: all 0.15s;
}
.nav-dot.answered-correct { background: var(--correct); color: white; border-color: var(--correct); }
.nav-dot.answered-wrong { background: var(--wrong); color: white; border-color: var(--wrong); }
.nav-dot.skipped { background: var(--lav); color: white; border-color: var(--lav); }
.nav-dot.current { border-color: var(--dark); color: var(--dark); font-weight: 900; }

/* Intro */
.test-intro { text-align: center; padding: 20px 0; }
.intro-icon { font-size: 4rem; margin-bottom: 16px; }
.intro-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.5rem; margin-bottom: 6px; }
.intro-desc { font-size: 0.85rem; color: var(--mid); margin-bottom: 28px; }

.subject-select { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.ss-item {
  padding: 16px 18px; background: white; border-radius: 16px;
  border: 1.5px solid var(--border); cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.18s; font-family: 'Nunito', sans-serif; font-weight: 700;
  font-size: 0.9rem;
}
.ss-item:hover, .ss-item.selected { border-color: var(--mint); background: rgba(126,206,196,0.06); }
.ss-item.selected::after { content: '✓'; margin-left: auto; color: var(--mint); font-size: 1.1rem; }
</style>
</head>
<body>
<div class="page test-page">
  <div class="test-topbar" id="test-topbar">
    <a class="back-btn" href="index.html" id="back-link">←</a>
    <div style="flex:1"></div>
    <button class="btn btn-ghost btn-sm" id="btn-finish" onclick="finishTest()" style="display:none;">Bitir & Sonuç</button>
  </div>

  <!-- Intro / subject select -->
  <div id="view-intro">
    <div class="test-intro fade-up">
      <div class="intro-icon">📝</div>
      <div class="intro-title">Test Modu</div>
      <div class="intro-desc">Bir konu seç ve teste başla.<br>Boş bırakabilirsin, sonunda sonuçlar gösterilir.</div>
    </div>
    <div class="subject-select" id="ss-list"></div>
    <button class="btn btn-dark" onclick="beginTest(false)">Teste Başla ▶</button>
    <button class="btn btn-ghost" onclick="beginTest(true)" id="btn-wrong-intro" style="display:none; margin-top:10px;">❌ Sadece Yanlışlarımla</button>
  </div>

  <!-- Test view -->
  <div id="view-test" style="display:none;">
    <!-- Nav dots -->
    <div class="nav-dots" id="nav-dots"></div>

    <!-- Progress -->
    <div class="test-progress">
      <div class="tp-bar"><div class="tp-fill" id="tp-fill" style="width:0%"></div></div>
      <div class="tp-labels">
        <span id="tp-msg">Hadi başla!</span>
        <span id="tp-count">0/0</span>
      </div>
    </div>

    <!-- Question -->
    <div class="question-wrap card" id="q-card">
      <div class="q-num-row">
        <div class="q-num" id="q-num">1</div>
        <div id="q-subject-tag" class="q-subject-tag"></div>
      </div>
      <div class="question-text" id="q-text">—</div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback"></div>
      <div class="action-row">
        <button class="btn btn-ghost" id="btn-skip" onclick="skipQuestion()">Boş Bırak</button>
        <button class="btn btn-mint" id="btn-next" onclick="nextQuestion()" style="display:none;">Sonraki →</button>
      </div>
    </div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a href="index.html"><span class="nav-icon">🏠</span>Ana Sayfa</a>
  <a href="cards.html"><span class="nav-icon">🃏</span>Kartlar</a>
  <a href="test.html" class="active"><span class="nav-icon">📝</span>Test</a>
  <a href="profile.html"><span class="nav-icon">👤</span>Profil</a>
</nav>

<script>
if (!SD.requireUser()) {}

// ── State ──────────────────────────────────────────────────
let questions = [];
let currentQ = 0;
let answers = {}; // index -> { chosen: number | null (skip) }
let selectedSubjectId = null;
let wrongOnlyMode = false;
let subjectData = null;

// ── Boot ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const subjectParam = params.get('subject');
  const wrongParam = params.get('wrong');

  if (subjectParam) {
    selectSubjectById(subjectParam);
    if (wrongParam) {
      setTimeout(() => beginTest(true), 100);
    } else {
      setTimeout(() => beginTest(false), 100);
    }
  } else {
    renderSubjectSelect();
  }
});

function renderSubjectSelect() {
  const list = document.getElementById('ss-list');
  list.innerHTML = '';
  SUBJECTS.forEach(s => {
    const wrongCount = SD.getWrongForSubject(s.id).length;
    const div = document.createElement('div');
    div.className = 'ss-item';
    div.dataset.id = s.id;
    div.innerHTML = `<span style="font-size:1.3rem">${s.icon}</span> ${s.title}
      ${wrongCount > 0 ? `<span class="chip chip-wrong" style="margin-left:auto">❌ ${wrongCount}</span>` : ''}`;
    div.onclick = () => selectSubjectById(s.id);
    list.appendChild(div);
  });
}

function selectSubjectById(sid) {
  selectedSubjectId = sid;
  document.querySelectorAll('.ss-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === sid);
  });
  const wrongCount = SD.getWrongForSubject(sid).length;
  const btn = document.getElementById('btn-wrong-intro');
  btn.style.display = wrongCount > 0 ? 'flex' : 'none';
  btn.textContent = `❌ Sadece Yanlışlarımla (${wrongCount} soru)`;
}

function beginTest(wrongOnly) {
  if (!selectedSubjectId) { showToast('Önce bir konu seç! 😊'); return; }
  subjectData = SUBJECTS.find(s => s.id === selectedSubjectId);
  wrongOnlyMode = wrongOnly;

  if (wrongOnly) {
    const wrongIds = SD.getWrongForSubject(selectedSubjectId);
    if (wrongIds.length === 0) { showToast('Hiç yanlışın yok! 🎉'); return; }
    questions = SD.shuffle(subjectData.questions.filter(q => wrongIds.includes(q.id)));
  } else {
    questions = SD.shuffle([...subjectData.questions]);
  }

  currentQ = 0; answers = {};
  document.getElementById('view-intro').style.display = 'none';
  document.getElementById('view-test').style.display = 'block';
  document.getElementById('btn-finish').style.display = 'flex';
  renderNavDots();
  renderQuestion(0);
}

// ── Nav dots ───────────────────────────────────────────────
function renderNavDots() {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === currentQ ? ' current' : '');
    d.id = 'dot-' + i;
    d.textContent = i + 1;
    d.onclick = () => jumpTo(i);
    wrap.appendChild(d);
  });
}

function updateDot(i) {
  const d = document.getElementById('dot-' + i);
  if (!d) return;
  d.classList.remove('current', 'answered-correct', 'answered-wrong', 'skipped');
  const ans = answers[i];
  if (ans === undefined) return;
  if (ans === null) d.classList.add('skipped');
  else if (ans === questions[i].correct) d.classList.add('answered-correct');
  else d.classList.add('answered-wrong');
}

function jumpTo(i) {
  currentQ = i;
  renderNavDots();
  renderQuestion(i);
}

// ── Render question ────────────────────────────────────────
function renderQuestion(i) {
  const q = questions[i];
  const card = document.getElementById('q-card');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'fadeUp 0.3s cubic-bezier(.4,0,.2,1)';

  document.getElementById('q-num').textContent = i + 1;

  // Subject tag
  const tag = document.getElementById('q-subject-tag');
  tag.textContent = subjectData.icon + ' ' + subjectData.title;
  tag.style.background = subjectData.color + '22';
  tag.style.color = subjectData.color;

  document.getElementById('q-text').textContent = q.question;

  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  q.options.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.id = `opt-${i}-${oi}`;
    div.innerHTML = `<span class="opt-ltr">${String.fromCharCode(65+oi)}</span><span class="opt-text">${opt}</span>`;
    div.onclick = () => selectAnswer(i, oi);
    optList.appendChild(div);
  });

  // Progress
  const answered = Object.keys(answers).length;
  const pct = questions.length > 0 ? answered / questions.length * 100 : 0;
  document.getElementById('tp-fill').style.width = pct + '%';
  document.getElementById('tp-count').textContent = answered + '/' + questions.length;
  const msgs = ['Hadi başla!', 'Süper gidiyorsun!', 'Devam et!', 'Az kaldı!', 'Neredeyse bitti!'];
  document.getElementById('tp-msg').textContent = msgs[Math.min(Math.floor(pct/25), 4)];

  // Feedback & buttons reset
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.innerHTML = '';
  document.getElementById('btn-skip').style.display = 'flex';
  document.getElementById('btn-next').style.display = 'none';

  // Restore previous answer state if already answered
  if (answers[i] !== undefined) {
    restoreAnswerState(i);
  }

  // Current dot
  document.querySelectorAll('.nav-dot').forEach((d, idx) => {
    d.classList.toggle('current', idx === i);
  });
}

function selectAnswer(qi, oi) {
  if (answers[qi] !== undefined) return; // already answered
  const q = questions[qi];
  answers[qi] = oi;

  const isCorrect = oi === q.correct;

  // Lock & style options
  for (let i = 0; i < q.options.length; i++) {
    const el = document.getElementById(`opt-${qi}-${i}`);
    if (!el) continue;
    el.classList.add('locked');
    if (i === q.correct) el.classList.add('correct');
    if (i === oi && !isCorrect) el.classList.add('wrong');
  }

  // Feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'fb-correct' : 'fb-wrong');
  fb.innerHTML = isCorrect
    ? `<strong>✅ Doğru!</strong> Harikasın.`
    : `<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;

  // Buttons
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent = qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';

  // Update dot
  updateDot(qi);
  updateProgressBar();
}

function restoreAnswerState(qi) {
  const q = questions[qi];
  const chosen = answers[qi];

  for (let i = 0; i < q.options.length; i++) {
    const el = document.getElementById(`opt-${qi}-${i}`);
    if (!el) continue;
    el.classList.add('locked');
    if (i === q.correct) el.classList.add('correct');
    if (chosen !== null && i === chosen && chosen !== q.correct) el.classList.add('wrong');
  }

  const fb = document.getElementById('feedback');
  if (chosen === null) {
    fb.className = 'feedback show fb-skip';
    fb.innerHTML = `<strong>⏭ Boş bıraktın.</strong> Doğru cevap: <strong>"${q.options[q.correct]}"</strong>`;
  } else if (chosen === q.correct) {
    fb.className = 'feedback show fb-correct';
    fb.innerHTML = `<strong>✅ Doğru!</strong>`;
  } else {
    fb.className = 'feedback show fb-wrong';
    fb.innerHTML = `<strong>❌ Yanlış.</strong> Doğru: <strong>"${q.options[q.correct]}"</strong><br><br>${q.explanation}`;
  }
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent = qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';
}

function skipQuestion() {
  const qi = currentQ;
  if (answers[qi] !== undefined) return;
  const q = questions[qi];
  answers[qi] = null; // null = skipped

  // Show correct answer
  for (let i = 0; i < q.options.length; i++) {
    const el = document.getElementById(`opt-${qi}-${i}`);
    if (!el) continue;
    el.classList.add('locked');
    if (i === q.correct) el.classList.add('correct');
  }

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show fb-skip';
  fb.innerHTML = `<strong>⏭ Boş bıraktın.</strong> Doğru cevap: <strong>"${q.options[q.correct]}"</strong>`;

  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-next').style.display = 'flex';
  document.getElementById('btn-next').textContent = qi < questions.length - 1 ? 'Sonraki →' : 'Sonuçları Gör 🏁';

  updateDot(qi);
  updateProgressBar();
}

function nextQuestion() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('current', i === currentQ));
    renderQuestion(currentQ);
  } else {
    finishTest();
  }
}

function updateProgressBar() {
  const answered = Object.keys(answers).length;
  const pct = questions.length > 0 ? answered / questions.length * 100 : 0;
  document.getElementById('tp-fill').style.width = pct + '%';
  document.getElementById('tp-count').textContent = answered + '/' + questions.length;
}

// ── Finish ─────────────────────────────────────────────────
function finishTest() {
  // Check all answered
  const unanswered = questions.filter((_, i) => answers[i] === undefined);
  if (unanswered.length > 0) {
    showToast(`${unanswered.length} soru cevaplanmadı — boş bırakmak için "Boş Bırak" kullan`);
    // Jump to first unanswered
    const firstUn = questions.findIndex((_, i) => answers[i] === undefined);
    if (firstUn >= 0) jumpTo(firstUn);
    return;
  }

  let correct = 0, wrongIds = [], skipped = 0;
  questions.forEach((q, i) => {
    const a = answers[i];
    if (a === null) { skipped++; wrongIds.push(q.id); }
    else if (a === q.correct) correct++;
    else wrongIds.push(q.id);
  });

  // Save stats (don't count skipped as attempted)
  const attempted = questions.length - skipped;
  SD.addStat(selectedSubjectId, attempted, correct);

  // Update wrong list
  const existingWrong = SD.getWrongForSubject(selectedSubjectId);
  let updatedWrong;
  if (wrongOnlyMode) {
    const correctIds = questions.filter((q, i) => answers[i] === q.correct).map(q => q.id);
    updatedWrong = existingWrong.filter(id => !correctIds.includes(id));
    wrongIds.forEach(id => { if (!updatedWrong.includes(id)) updatedWrong.push(id); });
  } else {
    const allIds = subjectData.questions.map(q => q.id);
    const correctIds = questions.filter((q, i) => answers[i] === q.correct).map(q => q.id);
    updatedWrong = existingWrong.filter(id => !correctIds.includes(id) && !allIds.includes(id));
    wrongIds.forEach(id => { if (!updatedWrong.includes(id)) updatedWrong.push(id); });
  }
  SD.saveWrongForSubject(selectedSubjectId, updatedWrong);

  // Save session for results page
  SD.setSession({
    subjectId: selectedSubjectId,
    wrongOnly: wrongOnlyMode,
    total: questions.length,
    correct,
    skipped,
    wrongIds,
    questions: questions.map((q, i) => ({
      question: q.question,
      options: q.options,
      correct: q.correct,
      explanation: q.explanation,
      chosen: answers[i]
    }))
  });
  window.location.href = 'results.html';
}
</script>
</body>
</html>
