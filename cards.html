<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilgi Kartları — StudyDeck</title>
<script src="data.js"></script>
<script src="app.js"></script>
<style>
.cards-page { padding-bottom: 100px; }

/* Deck area */
.deck-area {
  position: relative; height: 380px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; user-select: none; touch-action: pan-y;
}

/* Shadow cards */
.shadow-card {
  position: absolute; width: 100%; max-width: 360px;
  height: 300px; border-radius: 24px;
  background: white; border: 1.5px solid var(--border);
  pointer-events: none;
}
.shadow-card:nth-child(1) { transform: rotate(5deg)  translateY(8px); opacity: 0.45; }
.shadow-card:nth-child(2) { transform: rotate(-3deg) translateY(4px); opacity: 0.7;  }

/* Main flash card */
.flash-card {
  position: absolute; width: 100%; max-width: 360px; height: 300px;
  cursor: grab; z-index: 10;
  transform-style: preserve-3d; perspective: 1000px;
}
.flash-card:active { cursor: grabbing; }

.card-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.48s cubic-bezier(.4,0,.2,1);
}
.flash-card.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  background: white; border-radius: 24px;
  border: 1.5px solid var(--border);
  box-shadow: 0 4px 28px rgba(30,30,42,0.10);
  backface-visibility: hidden;
  display: flex; flex-direction: column;
  padding: 28px 24px; overflow: hidden;
}
.card-face::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--mint), var(--lav));
  border-radius: 24px 24px 0 0;
}
.card-back { transform: rotateY(180deg); }
.card-back::before { background: linear-gradient(90deg, var(--peach), #f4d07c); }

.card-subject {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.6px;
  padding: 4px 10px; border-radius: 99px; display: inline-flex;
  align-self: flex-start; margin-bottom: 16px;
}
.card-question-text {
  font-weight: 600; font-size: 1.05rem; line-height: 1.55;
  flex: 1; display: flex; align-items: center;
}
.card-hint {
  text-align: center; font-size: 0.72rem; color: var(--mid);
  font-family: 'Nunito', sans-serif; font-weight: 600;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }

.card-answer-label {
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--peach); margin-bottom: 10px;
}
.card-answer-text { font-size: 0.9rem; line-height: 1.65; flex: 1; white-space: pre-line; overflow-y: auto; }

/* Swipe indicators */
.swipe-indicator {
  position: absolute; inset: 0; border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.4rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.08s; border: 3px solid transparent;
}
.swipe-indicator.left  { background: rgba(244,124,124,0.08); border-color: rgba(244,124,124,0.3); color: var(--wrong); }
.swipe-indicator.right { background: rgba(107,203,139,0.08); border-color: rgba(107,203,139,0.3); color: var(--correct); }

/* Swipe buttons */
.swipe-btns {
  display: flex; gap: 16px; align-items: center;
  justify-content: center; margin-bottom: 24px;
}
.swipe-btn {
  width: 64px; height: 64px; border-radius: 50%;
  border: 2px solid var(--border); background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; cursor: pointer;
  box-shadow: var(--shadow); transition: all 0.18s;
}
.swipe-btn:hover { transform: scale(1.08); }
.swipe-btn.dir-left:hover  { border-color: var(--wrong);   box-shadow: 0 4px 16px rgba(244,124,124,0.3); }
.swipe-btn.dir-right:hover { border-color: var(--correct); box-shadow: 0 4px 16px rgba(107,203,139,0.3); }
.flip-btn { width: 50px; height: 50px; font-size: 1.2rem; background: var(--light); }

/* Progress */
.cards-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.cp-bar { flex: 1; height: 6px; background: var(--light); border-radius: 99px; overflow: hidden; }
.cp-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--lav)); border-radius: 99px; transition: width 0.4s; }
.cp-count { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem; color: var(--mid); white-space: nowrap; }

.swipe-legend {
  display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--mid);
  font-family: 'Nunito', sans-serif; font-weight: 600; margin-bottom: 20px;
}
.swipe-legend .sl-left  { color: var(--wrong); }
.swipe-legend .sl-right { color: var(--correct); }

/* Done screen */
.done-screen { display: none; text-align: center; padding: 40px 20px; }
.done-screen.show { display: block; }
.done-big   { font-size: 4rem; margin-bottom: 16px; }
.done-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.5rem; margin-bottom: 8px; }
.done-sub   { font-size: 0.85rem; color: var(--mid); margin-bottom: 28px; }
.done-stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 28px; }
.done-stat  { flex: 1; padding: 16px; border-radius: 16px; border: 1.5px solid var(--border); background: white; }
.done-stat .ds-num { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.8rem; }
.done-stat .ds-label { font-size: 0.75rem; color: var(--mid); margin-top: 4px; }
.known .ds-num   { color: var(--correct); }
.unknown .ds-num { color: var(--wrong); }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 99px; font-family: 'Nunito', sans-serif;
  font-weight: 700; font-size: 0.75rem; border: 1.5px solid var(--border);
  background: white; cursor: pointer; transition: all 0.15s; color: var(--mid);
}
.filter-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
</style>
</head>
<body>
<div class="page cards-page">
  <div class="navbar">
    <button class="back-btn" onclick="handleBack()">←</button>
    <span style="font-family:'Nunito',sans-serif; font-weight:800;">Bilgi Kartları 🃏</span>
    <a class="nav-avatar" id="cards-av" href="profile.html">?</a>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tümü</button>
  </div>

  <div class="cards-progress">
    <div class="cp-bar"><div class="cp-fill" id="cp-fill" style="width:0%"></div></div>
    <div class="cp-count" id="cp-count">0/0</div>
  </div>
  <div class="swipe-legend">
    <span class="sl-left">← Bilmiyorum</span>
    <span class="sl-right">Biliyorum →</span>
  </div>

  <div class="deck-area" id="deck-area">
    <div class="shadow-card"></div>
    <div class="shadow-card"></div>
    <div class="flash-card" id="flash-card">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <div class="card-subject" id="cf-subject">Konu</div>
          <div class="card-question-text" id="cf-question">Yükleniyor...</div>
          <div class="card-hint">Cevabı görmek için tıkla 👆</div>
        </div>
        <div class="card-face card-back">
          <div class="card-answer-label">💡 Cevap</div>
          <div class="card-answer-text" id="cb-answer">—</div>
        </div>
      </div>
      <div class="swipe-indicator left"  id="si-left">❌ Bilmiyorum</div>
      <div class="swipe-indicator right" id="si-right">✅ Biliyorum</div>
    </div>
  </div>

  <div class="swipe-btns" id="swipe-btns">
    <button class="swipe-btn dir-left"  onclick="swipeCard('left')"  title="Bilmiyorum">❌</button>
    <button class="swipe-btn flip-btn"  onclick="flipCard()"         title="Çevir">🔄</button>
    <button class="swipe-btn dir-right" onclick="swipeCard('right')" title="Biliyorum">✅</button>
  </div>

  <div class="done-screen" id="done-screen">
    <div class="done-big">🎉</div>
    <div class="done-title">Tüm kartları tamamladın!</div>
    <div class="done-sub" id="done-sub">—</div>
    <div class="done-stats">
      <div class="done-stat known">
        <div class="ds-num" id="done-known">0</div>
        <div class="ds-label">✅ Bildim</div>
      </div>
      <div class="done-stat unknown">
        <div class="ds-num" id="done-unknown">0</div>
        <div class="ds-label">❌ Bilmedim</div>
      </div>
    </div>
    <button class="btn btn-dark"  onclick="resetDeck()"    style="max-width:300px;margin:0 auto 10px;">🔁 Tümünü Tekrar Et</button>
    <button class="btn btn-ghost" onclick="resetUnknown()" id="btn-repeat-unknown" style="max-width:300px;margin:0 auto;">❌ Sadece Bilmediklerimi</button>
    <a href="index.html" class="btn btn-ghost" style="max-width:300px;margin:10px auto 0;">🏠 Ana Sayfa</a>
  </div>
</div>

<!-- Bottom nav — locked during card session -->
<nav class="bottom-nav">
  <a id="nav-home"    href="index.html" ><span class="nav-icon">🏠</span>Ana Sayfa</a>
  <a id="nav-cards"   href="cards.html"  class="active"><span class="nav-icon">🃏</span>Kartlar</a>
  <a id="nav-test"    href="test.html"  ><span class="nav-icon">📝</span>Test</a>
  <a id="nav-profile" href="profile.html"><span class="nav-icon">👤</span>Profil</a>
</nav>

<script>
if (!SD.requireUser()) {}

const user = SD.getUser();
document.getElementById('cards-av').textContent = SD.initials(user.name);

// ── State ──────────────────────────────────────────────────
let deck = [], currentIndex = 0, knownCount = 0, unknownIds = [];
let isFlipped = false, isDragging = false;
let startX = 0, currentX = 0;
const THRESHOLD = 80;
let sessionActive = false;
let currentFilter = 'all';

// ── Nav lock ───────────────────────────────────────────────
const NAV_IDS   = ['nav-home','nav-test','nav-profile'];
const NAV_HREFS = { 'nav-home':'index.html','nav-test':'test.html','nav-profile':'profile.html' };

function lockNav() {
  sessionActive = true;
}
function unlockNav() {
  sessionActive = false;
}

function handleBack() {
  saveProgress();
  history.back();
}

// ── Save / restore progress ────────────────────────────────
function saveProgress() {
  if (!sessionActive || deck.length === 0) return;
  SD.set('sd_fc_progress', {
    filter: currentFilter,
    deckIds: deck.map(f => f.id),
    currentIndex,
    knownCount,
    unknownIds
  });
}

function loadProgress() {
  return SD.get('sd_fc_progress', null);
}

function clearProgress() {
  SD.del('sd_fc_progress');
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Build filter buttons
  const bar = document.getElementById('filter-bar');
  SUBJECTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = s.id;
    btn.textContent = s.icon + ' ' + s.title;
    btn.onclick = () => { clearProgress(); setFilter(s.id, btn); };
    bar.appendChild(btn);
  });

  // Check for saved progress
  const saved = loadProgress();
  if (saved && saved.deckIds && saved.deckIds.length > 0 && saved.currentIndex < saved.deckIds.length) {
    showResumeToast(saved);
  } else {
    setFilter('all', document.querySelector('[data-filter="all"]'));
  }
});

function showResumeToast(saved) {
  // Show inline resume banner instead of blocking toast
  const bar = document.getElementById('filter-bar');
  const banner = document.createElement('div');
  banner.id = 'resume-banner';
  banner.style.cssText = `
    background: linear-gradient(135deg,rgba(126,206,196,0.15),rgba(181,168,224,0.15));
    border: 1.5px solid var(--mint); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  `;
  const remaining = saved.deckIds.length - saved.currentIndex;
  banner.innerHTML = `
    <span style="font-size:1.4rem">🃏</span>
    <div style="flex:1; min-width:0;">
      <div style="font-family:'Nunito',sans-serif; font-weight:800; font-size:0.88rem;">Yarım kalan oturum</div>
      <div style="font-size:0.75rem; color:var(--mid); margin-top:2px;">${remaining} kart kaldı · ${saved.knownCount} bildin, ${saved.unknownIds.length} bilmedin</div>
    </div>
    <button id="btn-resume" class="btn btn-mint btn-sm" style="white-space:nowrap;">Devam Et →</button>
    <button id="btn-resume-discard" class="btn btn-ghost btn-sm" style="white-space:nowrap;">Yeniden Başla</button>
  `;
  bar.parentNode.insertBefore(banner, bar);

  document.getElementById('btn-resume').onclick = () => {
    banner.remove();
    resumeProgress(saved);
  };
  document.getElementById('btn-resume-discard').onclick = () => {
    clearProgress();
    banner.remove();
    setFilter('all', document.querySelector('[data-filter="all"]'));
  };
}

function resumeProgress(saved) {
  currentFilter = saved.filter;
  // Restore filter button active state
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === currentFilter);
  });

  // Rebuild deck from saved IDs
  const allCards = [...FLASHCARDS];
  deck = saved.deckIds.map(id => allCards.find(f => f.id === id)).filter(Boolean);
  currentIndex = saved.currentIndex;
  knownCount   = saved.knownCount;
  unknownIds   = saved.unknownIds || [];
  isFlipped    = false;

  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('deck-area').style.display = 'flex';
  document.getElementById('swipe-btns').style.display = 'flex';

  if (deck.length > 0 && currentIndex < deck.length) {
    lockNav();
    renderCard();
  } else {
    showDone();
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  deck = filter === 'all'
    ? SD.shuffle([...FLASHCARDS])
    : SD.shuffle(FLASHCARDS.filter(f => {
        const sub = SUBJECTS.find(s => s.id === filter);
        return sub && f.subject === sub.title;
      }));

  currentIndex = 0; knownCount = 0; unknownIds = []; isFlipped = false;
  clearProgress();

  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('deck-area').style.display = 'flex';
  document.getElementById('swipe-btns').style.display = 'flex';

  if (deck.length > 0) {
    lockNav();
    renderCard();
  } else {
    showToast('Bu konuya ait kart yok!');
    unlockNav();
  }
}

// ── Render ─────────────────────────────────────────────────
function renderCard() {
  if (currentIndex >= deck.length) { showDone(); return; }
  const fc = deck[currentIndex];
  isFlipped = false;

  const cardEl = document.getElementById('flash-card');
  cardEl.style.transition = '';
  cardEl.style.transform  = '';
  cardEl.style.opacity    = '1';
  cardEl.classList.remove('flipped');

  document.getElementById('cf-subject').textContent = fc.subject;
  document.getElementById('cf-subject').style.background = fc.subjectColor + '22';
  document.getElementById('cf-subject').style.color      = fc.subjectColor;
  document.getElementById('cf-question').textContent = fc.question;
  document.getElementById('cb-answer').textContent   = fc.answer;

  document.getElementById('si-left').style.opacity  = '0';
  document.getElementById('si-right').style.opacity = '0';

  updateProgress();
}

function updateProgress() {
  const total = deck.length, done = currentIndex;
  const pct = total > 0 ? done / total * 100 : 0;
  document.getElementById('cp-fill').style.width = pct + '%';
  document.getElementById('cp-count').textContent = done + '/' + total;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flash-card').classList.toggle('flipped', isFlipped);
}

// ── Swipe ──────────────────────────────────────────────────
function swipeCard(dir) {
  const cardEl = document.getElementById('flash-card');
  const fc = deck[currentIndex];

  if (dir === 'right') {
    knownCount++;
    cardEl.style.transition = 'transform 0.38s ease, opacity 0.38s ease';
    cardEl.style.transform  = 'translateX(130%) rotate(22deg)';
    cardEl.style.opacity    = '0';
  } else {
    unknownIds.push(fc.id);
    cardEl.style.transition = 'transform 0.38s ease, opacity 0.38s ease';
    cardEl.style.transform  = 'translateX(-130%) rotate(-22deg)';
    cardEl.style.opacity    = '0';
  }

  setTimeout(() => { currentIndex++; saveProgress(); renderCard(); }, 360);
}

// ── Drag (mouse + touch) ───────────────────────────────────
const cardEl = document.getElementById('flash-card');

function onStart(x) { isDragging = true; startX = x; currentX = x; cardEl.style.transition = 'none'; }
function onMove(x) {
  if (!isDragging) return;
  currentX = x;
  const dx = x - startX, rot = dx * 0.08;
  cardEl.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
  const prog = Math.min(Math.abs(dx) / THRESHOLD, 1);
  if (dx > 20) {
    document.getElementById('si-right').style.opacity = String(prog);
    document.getElementById('si-left').style.opacity  = '0';
  } else if (dx < -20) {
    document.getElementById('si-left').style.opacity  = String(prog);
    document.getElementById('si-right').style.opacity = '0';
  } else {
    document.getElementById('si-left').style.opacity  = '0';
    document.getElementById('si-right').style.opacity = '0';
  }
}
function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  const dx = currentX - startX;
  cardEl.style.transition = 'transform 0.28s ease, opacity 0.28s ease';
  if (dx >  THRESHOLD) swipeCard('right');
  else if (dx < -THRESHOLD) swipeCard('left');
  else {
    cardEl.style.transform = '';
    document.getElementById('si-left').style.opacity  = '0';
    document.getElementById('si-right').style.opacity = '0';
  }
}

// Mouse
cardEl.addEventListener('mousedown',  e => onStart(e.clientX));
document.addEventListener('mousemove', e => onMove(e.clientX));
document.addEventListener('mouseup',   () => onEnd());

// Touch
cardEl.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
cardEl.addEventListener('touchmove',  e => { onMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
cardEl.addEventListener('touchend',   () => onEnd());

// Click to flip (only if not a significant drag)
cardEl.addEventListener('click', () => {
  if (Math.abs(currentX - startX) < 10) flipCard();
});

// ── Done ───────────────────────────────────────────────────
function showDone() {
  clearProgress();
  unlockNav();
  document.getElementById('deck-area').style.display = 'none';
  document.getElementById('swipe-btns').style.display = 'none';
  document.getElementById('done-screen').classList.add('show');
  document.getElementById('done-known').textContent   = knownCount;
  document.getElementById('done-unknown').textContent = unknownIds.length;
  document.getElementById('done-sub').textContent =
    knownCount === deck.length ? 'Mükemmel! Hepsini bildin! 🏆' :
    `${knownCount}/${deck.length} kartı bildin.`;
  document.getElementById('btn-repeat-unknown').style.display =
    unknownIds.length > 0 ? 'flex' : 'none';
}

function resetDeck() {
  setFilter(currentFilter, document.querySelector(`[data-filter="${currentFilter}"]`));
}

function resetUnknown() {
  const ids = [...unknownIds];
  deck = SD.shuffle(ids.map(id => FLASHCARDS.find(f => f.id === id)).filter(Boolean));
  currentIndex = 0; knownCount = 0; unknownIds = []; isFlipped = false;
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('deck-area').style.display = 'flex';
  document.getElementById('swipe-btns').style.display = 'flex';
  if (deck.length > 0) { lockNav(); renderCard(); }
}
</script>
</body>
</html>
